  power_as_service:
    meta:
      name: Power-as-a-Service Platform
      slug: power_as_service
      description: 'Customer: new space entrants, hosted payload operators, and capital-constrained satellite programmes.
        Problem: every satellite must build its own solar arrays and batteries, a major CAPEX item. Solution: NEOWATT operates
        a multi-customer TX satellite in LEO. Each customer integrates a small RX and pays an annual subscription. Architecture:
        this is a utility model by definition -- NEOWATT owns and operates the power infrastructure, customers subscribe.
        One TX platform serves multiple customer satellites via beam steering. NEOWATT sells the RX modules but operates the
        TX.'
      category: Economic
      time_horizon: Mid-term
      model_class: PowerAsServiceModel
      notion_capabilities:
      - Shift from CAPEX to OPEX for power
      - Decoupling power generation from spacecraft
      - Sale of surplus power by generators
      model_prose: 'NEOWATT operates a multi-customer TX satellite in LEO and sells power subscriptions. Revenue is the annual
        subscription price per customer multiplied by the number of customers served by one TX platform. NEOWATT bears the
        full CAPEX: the TX platform, one RX module per customer (both hardware and launch for each), and ground segment infrastructure.
        The customer saving compares the total subscription cost over the system lifetime against the solar array and battery
        CAPEX the customer avoids by subscribing.'
      model_maths: '**Annual revenue (per TX platform):**

        $$R = P_{sub} \times N_{cust}$$


        - $P_{sub}$ = annual subscription price per customer ($/yr)

        - $N_{cust}$ = number of customer satellites served


        **CAPEX:**

        $$C_{capex} = C_{tx} + N_{cust} \times (C_{rx} + m_{rx} \times L) + m_{tx} \times L + C_{ground}$$


        Note: RX costs scale with customer count; TX cost is shared.


        **Annual OPEX:** $C_{ops}$


        **Customer saving:**

        $$S = \frac{C_{avoided} - P_{sub} \times Y}{C_{avoided}}$$


        - $C_{avoided}$ = solar array + battery CAPEX the customer no longer needs ($)

        - $Y$ = amortisation years'
