        description: Receiver module mass
        justification: PV panel + power electronics + mounting structure. Must be light enough to justify vs battery mass
          it replaces. 4-15kg range, 8kg mode.
        distribution:
          type: triangular
          low: 4
          mode: 8
          high: 15
        confidence: estimated
        source: PV receiver mass budget analysis
      ops_cost_k_yr:
        value: 30
        unit: $k/yr
        description: Annual operations and ground segment cost
        justification: Covers mission control staffing share, software maintenance, ground station uplink time, insurance.
          $15-60k range based on analogous small satellite operations.
        distribution:
          type: triangular
          low: 15
          mode: 30
          high: 60
        confidence: guessed
        source: Analogous smallsat operations costs
      ground_segment_k:
        value: 50
        unit: $k
        description: One-time ground segment setup cost
        justification: Ground station equipment, software development, testing and commissioning. Shared across multiple customers.
          $20-100k range.
        distribution:
          type: triangular
          low: 20
          mode: 50
          high: 100
        confidence: guessed
        source: Ground station infrastructure estimates
    economic:
      wtp_per_W:
        value: 220
        unit: $/W
        description: Customer willingness to pay per watt of eclipse power
        justification: Must be below incumbent cost ($300/W) to be attractive. $220/W mode gives ~27% saving. Lower bound
          $100/W reflects highly price-sensitive customers. Upper bound $400/W reflects customers valuing operational continuity
          and willing to pay near-incumbent prices.
        distribution:
          type: triangular
          low: 100
          mode: 220
          high: 400
        confidence: guessed
        source: Must be below incumbent; no direct customer validation yet
      amortization_years:
        value: 7
        unit: years
        description: System operational lifetime
        justification: Typical LEO satellite mission lifetime 5-10 years. 7 years mode reflects standard smallsat design life.
          Triangular captures uncertainty in technology longevity.
        distribution:
          type: triangular
          low: 5
          mode: 7
          high: 10
        confidence: estimated
        source: Standard satellite mission lifetime assumptions
      addressable_units:
        value: 200
        unit: satellites
        description: Number of LEO satellites that could benefit
        justification: ~7000+ active LEO satellites as of 2025. Most are constellation sats with standardised power. Estimate
          200-800 non-constellation LEO sats where bespoke power solutions matter. Lower bound 50 for very conservative early
          market.
        distribution:
          type: triangular
          low: 50
          mode: 200
          high: 800
        confidence: estimated
