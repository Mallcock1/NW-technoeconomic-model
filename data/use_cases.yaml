  # ─────────────────────────────────────────────────────────────────────────────
  # 10. Debris Laser Ablation
  # ─────────────────────────────────────────────────────────────────────────────
  debris_laser_ablation:
    meta:
      name: "Debris Laser Ablation"
      slug: "debris_laser_ablation"
      description: "High-power laser to ablate debris surfaces, generating thrust for deorbit. No receiver needed."
      category: "Active Debris Removal"
      time_horizon: "Mid-term"
      model_class: "DebrisAblationModel"
      incumbent_type: "greenfield"

      model_prose: |
        Space debris is a growing threat to orbital infrastructure. There are ~30,000 tracked
        objects and millions of smaller fragments. No cost-effective removal solution exists at
        scale. NEOWATT's laser system can ablate the surface of debris objects, creating a small
        jet of vaporised material that generates thrust to lower the object's orbit for natural
        deorbit. Unlike capture-and-deorbit methods, laser ablation is contactless and can
        engage multiple objects from a single platform. Revenue comes from debris removal
        contracts, regulatory compliance mandates, and insurance premium reductions.

      model_maths: |
        **Revenue model (annual):**
        $$R = WTP_{/object} \times N_{objects/yr} \times \alpha$$

        **Cost model (no RX needed):**
        $$C_{CAPEX} = C_{TX} + m_{TX} \times c_{launch} + C_{ground}$$
        $$C_{OPEX/yr} = C_{ops}$$

        **Viability (greenfield):** No direct incumbent to beat. Uses P(positive NPV) >= 50%.

        **Incumbent framing:** Cost of inaction = regulatory fines, insurance premium
        increases, collision avoidance manoeuvre costs per object.

    incumbent:
      name: "No cost-effective solution (regulatory/insurance pressure)"
      cost_per_object_k:
        value: 500
        unit: "$k/object"
        description: "Estimated compliance/insurance cost per debris object"
        justification: "Lognormal distribution reflects high uncertainty and positive skew. Most objects have moderate compliance cost (~$200-500k via collision avoidance manoeuvres, insurance increases) but some high-value orbital regimes face much higher costs ($1M+). Mean $500k, std $300k."
