  stealth:
    meta:
      name: "Stealth / Low-Observable Spacecraft"
      slug: "stealth"
      description: "Reduce radar cross-section and optical reflectivity by removing large solar arrays. Defence and SSA applications."
      category: "Signature Management"
      time_horizon: "Long-term"
      model_class: "StealthModel"
      notion_capabilities:
        - "Reduced radar cross section"
        - "Reduced optical reflectivity"

      model_prose: |
        Solar arrays are the dominant contributor to a satellite's radar cross-section (RCS)
        and optical brightness. For defence applications, reducing detectability is operationally
        critical. Removing arrays can reduce RCS by 10-20dB and optical magnitude by 2-4 mag.
        Current alternatives (coatings, orbit selection, operational constraints) are limited
        and compromise mission performance. NEOWATT offers a structural solution by eliminating
        the primary signature source. Defence customers typically have higher WTP with less
        price sensitivity.

      model_maths: |
        **Revenue model (annual):**
        $$R = P_{delivered} \times WTP_{/W} \times \kappa_{defence} \times \alpha$$

        Where $\kappa_{defence}$ is the defence WTP premium multiplier (typically 1.2-4x)
        reflecting the strategic value of low observability.

        **Customer saving:**
        $$S = \frac{C_{incumbent/sc} - C_{NEOWATT/sc}}{C_{incumbent/sc}}$$

