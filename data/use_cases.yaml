        current spacecraft tightly couple solar arrays with payload -- when payload becomes obsolete (compute chips every
        3-5 years), arrays are wasted. Solution: NEOWATT operates a long-lived solar generation platform that beams power
        to short-lived consumer modules in a nearby orbit. Architecture: the whole value proposition is decoupled infrastructure
        with mismatched lifetimes. NEOWATT must operate the long-lived generation platform (15+ years) while customers swap
        in/out consumer modules every 3-5 years. Service model is essential to the architecture.'
      category: Power Delivery
      time_horizon: Mid-term
      model_class: StandardPowerModel
      model_prose: 'NEOWATT operates a long-lived solar generation platform in orbit. Revenue is a price per watt of delivered
        power, adjusted for duty cycle and system availability. NEOWATT bears the full CAPEX: TX platform hardware, RX modules
        for consumer spacecraft, launch costs for both, and ground segment. The customer saving compares NEOWATT''s price
        per watt against the cost of co-locating solar arrays on each short-lived payload module that would otherwise be discarded
        every 3-5 years when the payload is refreshed.'
      model_maths: '**Annual revenue:**

        $$R = P \times W \times d \times a$$


        - $P$ = power delivered to consumer module (W)

        - $W$ = willingness to pay per watt ($/W)

        - $d$ = duty cycle (fraction of orbit delivering power)

        - $a$ = system availability


        **CAPEX:**

        $$C_{capex} = C_{tx} + C_{rx} + (m_{tx} + m_{rx}) \times L + C_{ground}$$


        **Annual OPEX:** $C_{ops}$


        **Customer saving:**

        $$S = \frac{C_{inc} - W}{C_{inc}}$$


        - $C_{inc}$ = cost per watt of co-located solar arrays that are discarded with each payload refresh ($/W)'
