  # 11. Lunar Night Survival
  # ─────────────────────────────────────────────────────────────────────────────
  lunar_night_survival:
    meta:
      name: "Lunar Night Survival"
      slug: "lunar_night_survival"
      description: "Beam power to lunar surface assets during the 14-day lunar night, replacing RTGs or hibernation."
      category: "Power Delivery"
      time_horizon: "Mid-term"
      model_class: "StandardPowerModel"

      model_prose: |
        The 14-day lunar night poses an existential challenge for surface missions. Without
        power, electronics freeze and batteries die permanently. Current options: RTGs
        (expensive, export-controlled, limited Pu-238 supply) or hibernation (accepting 14
        days of no operations per month). NEOWATT beams power from a lunar orbiter or
        Earth-based station to surface assets, enabling continuous operations through the
        lunar night. This is transformative for Artemis base camp, ISRU operations, and
        commercial lunar activities.

      model_maths: |
        **Revenue model:** Same as standard power delivery.
        $$R = P_{delivered} \times WTP_{/W} \times \delta_{night} \times \alpha$$

        Where $\delta_{night} \approx 0.5$ (14 days night / 28 day cycle).

        **Key challenge:** If beaming from Earth, distance is ~384,400km with very low
        link efficiency (~4%). Lunar orbiter relay is more efficient but adds orbital
        infrastructure cost.

