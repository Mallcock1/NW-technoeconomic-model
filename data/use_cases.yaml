      tx_mass_kg:
        value: 60
        unit: kg
        description: Ground TX mass
        justification: 'Ground-based: mass is not a launch cost driver but affects transportability and deployment cost. 30-120kg
          for a field-deployable system.'
        distribution:
          type: triangular
          low: 30
          mode: 60
          high: 120
