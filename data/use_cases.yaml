      rx_mass_kg:
        value: 5
        unit: kg
        description: HAPS receiver mass
        justification: Extremely mass-sensitive platform. Must be <10kg. 2-10kg range, 5kg mode.
        distribution:
          type: triangular
          low: 2
          mode: 5
          high: 10
        confidence: estimated
        source: PV receiver mass budget analysis
      ops_cost_k_yr:
        value: 20
        unit: $k/yr
        description: Annual operations
        justification: Ground-based system has low ops cost – site maintenance, power, staffing. $10-45k.
        distribution:
          type: triangular
          low: 10
          mode: 20
          high: 45
        confidence: guessed
        source: Analogous smallsat operations costs
      ground_segment_k:
        value: 80
        unit: $k
        description: Ground station infrastructure
        justification: Site preparation, power supply, enclosure, network connectivity. $30-150k.
        distribution:
          type: triangular
          low: 30
          mode: 80
          high: 150
