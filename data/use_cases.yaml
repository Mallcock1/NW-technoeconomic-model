    meta:
      name: PV-Free Spacecraft
      slug: array_free_spacecraft
      description: 'Customer: LEO constellation operators (OneWeb, Kuiper) and precision-pointing missions (Earth observation,
        astronomy). Problem: deployable solar arrays add mass, volume, drag, and collision risk, and force a Sun-pointing
        constraint. Solution: NEOWATT sells a TX payload and RX modules. The customer designs their new satellite without
        solar arrays, using the RX as the primary power input. The TX is integrated on a companion satellite or shared platform.
        Architecture: this is a design-phase decision -- the customer commits when specifying their new satellite. They buy
        and integrate the hardware themselves.'
      category: Spacecraft Design
      time_horizon: Mid-term
      model_class: HardwarePVFreeModel
      notion_capabilities:
      - Avoid over-sizing solar arrays
      - Smaller or no solar arrays
      - Lower launch volume
      - Reduced drag and collision risk
      - Reduced need for Sun-pointing
      - Improved pointing stability
      model_prose: 'NEOWATT manufactures and sells a TX payload and RX modules to the customer, who integrates them at the
        satellite design phase. Revenue is the hardware sale price (annualised over the system lifetime) plus an annual support
        fee. NEOWATT''s costs are manufacturing and ground support only. The customer saving is measured per kilogram of solar
        array mass removed: the cost of our RX module per kg of mass saved, compared against the incumbent cost per kg of
        deployable solar array hardware it replaces.'
      model_maths: '**Annual revenue:**

        $$R = \frac{S_{tx} + S_{rx}}{Y} + F_{support}$$


