# NEOWATT Technoeconomic Model — Use Case Definitions
# Each use case defines meta, incumbent, technical, cost, and economic parameters.
# Every numeric parameter specifies a distribution for Monte Carlo sampling,
# plus a justification explaining why that distribution type and values were chosen.

use_cases:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. LEO Eclipse Power
  # ─────────────────────────────────────────────────────────────────────────────
  leo_eclipse_power:
    meta:
      name: "LEO Eclipse Power"
      slug: "leo_eclipse_power"
      description: "Beam power to LEO satellites during eclipse or anomaly recovery, reducing battery oversizing and extending duty cycles."
      category: "Power Delivery"
      time_horizon: "Near-term"
      model_class: "StandardPowerModel"
      notion_capabilities:
        - "Power during eclipses and anomaly recovery"
        - "Power resilience after partial degradation or damage"

      model_prose: |
        LEO satellites spend ~35% of each orbit in Earth's shadow (eclipse). During eclipse,
        they rely entirely on batteries charged during the sunlit portion. This forces operators
        to oversize solar arrays (to charge faster) and carry large battery packs, adding mass,
        cost, and failure modes. NEOWATT beams power to satellites during eclipse from an
        orbital transmitter or ground station, reducing or eliminating the need for battery
        oversizing. The customer value is measured by comparing NEOWATT's price per watt of
        eclipse power against the incumbent cost of achieving the same capability through
        extra solar panels and batteries.

      model_maths: |
        **Revenue model (annual):**
        $$R = P_{delivered} \times WTP_{/W} \times \delta \times \alpha$$

        Where:
        - $P_{delivered}$ = power delivered at receiver (W)
        - $WTP_{/W}$ = customer willingness to pay per watt ($/W)
        - $\delta$ = duty cycle (fraction of orbit in eclipse, ~0.35)
        - $\alpha$ = system availability (accounting for geometry, weather, maintenance)

        **Cost model:**
        $$C_{CAPEX} = C_{TX} + C_{RX} + (m_{TX} + m_{RX}) \times c_{launch} + C_{ground}$$
        $$C_{OPEX/yr} = C_{ops}$$
        $$C_{total} = C_{CAPEX} + C_{OPEX/yr} \times N_{years}$$

        **Customer saving vs incumbent:**
        $$S = \frac{C_{incumbent/W} - WTP_{/W}}{C_{incumbent/W}}$$

        **Viability test:** $P(S \geq 50\%) \geq 60\%$ → GO

    incumbent:
      name: "Battery oversizing + extra solar panels"
      cost_per_W:
        value: 300
        unit: "$/W"
        description: "Cost of delivering 1W during eclipse via batteries + panel overbuild"
        justification: "Based on typical LEO smallsat battery costs ($500-1000/kg) and solar array costs ($500-2000/W at system level). A 500W eclipse capability requires ~1.5kWh battery pack (~$15k-30k) plus oversized panels (~$50-100k), giving roughly $200-500/W range. Central estimate $300/W from aggregated smallsat cost models."
        distribution:
          type: triangular
          low: 200
          mode: 300
          high: 500

    technical:
      power_delivered_W:
        value: 500
        unit: "W"
        description: "Power delivered at receiver during eclipse"
        justification: "Triangular distribution reflects uncertainty in customer power needs. 200W lower bound covers basic housekeeping loads. 500W mode covers typical smallsat payload operation. 1500W high end covers larger satellites or multi-customer scenarios."
        distribution:
          type: triangular
          low: 200
          mode: 500
          high: 1500
      distance_km:
        value: 600
        unit: "km"
        description: "Typical LEO sat-to-sat or ground-to-LEO distance"
        justification: "LEO altitudes range 400-1200km. 600km mode represents the densest orbital band. Lower bound 400km for ISS-orbit customers, upper 1200km for sun-synchronous."
        distribution:
          type: triangular
          low: 400
          mode: 600
          high: 1200
      link_efficiency:
        value: 0.12
        unit: "fraction"
        description: "End-to-end optical link efficiency (laser to electrical at RX)"
        justification: "Chain: laser wall-plug efficiency (~40-50%) x optics/pointing losses (~50-70%) x atmospheric/vacuum transmission (~80-95%) x PV conversion at laser wavelength (~40-50%). Combined gives 5-25% range. 12% mode is conservative for current technology. Will improve as PV efficiency and laser tech advance."
        distribution:
          type: triangular
          low: 0.05
          mode: 0.12
          high: 0.25
      duty_cycle:
        value: 0.35
        unit: "fraction"
        description: "Fraction of orbit in eclipse requiring beamed power"
        justification: "Uniform distribution because eclipse fraction is geometrically determined by orbit altitude and inclination. LEO eclipses typically 25-40% of orbit period. Uniform reflects that all values in this range are roughly equally likely across the customer base."
        distribution:
          type: uniform
          low: 0.25
          high: 0.40
      availability:
        value: 0.90
        unit: "fraction"
        description: "System availability accounting for weather, geometry, maintenance"
        justification: "Triangular with mode at 0.90. Lower bound 0.75 accounts for early-stage reliability issues and orbital geometry constraints (TX and RX must have line of sight). Upper bound 0.98 reflects mature constellation with redundancy."
        distribution:
          type: triangular
          low: 0.75
          mode: 0.90
          high: 0.98

    cost:
      tx_hardware_k:
        value: 180
        unit: "$k"
        description: "Transmitter payload hardware cost"
        justification: "Estimated from laser module ($30-80k), optics/telescope ($20-50k), power conditioning ($15-40k), thermal management ($10-30k), PAT system ($25-60k), structure and integration ($20-50k). Total range $100-350k, mode $180k for initial production."
        distribution:
          type: triangular
          low: 100
          mode: 180
          high: 350
      rx_hardware_k:
        value: 60
        unit: "$k"
        description: "Receiver module cost"
        justification: "PV array tuned to laser wavelength ($15-40k), power conditioning ($5-15k), optical concentrator/tracking ($5-20k), integration ($5-15k). Simpler than TX. Range $30-120k, mode $60k."
        distribution:
          type: triangular
          low: 30
          mode: 60
          high: 120
      tx_mass_kg:
        value: 25
        unit: "kg"
        description: "Transmitter payload mass"
        justification: "Based on comparable laser communication terminals (5-15kg) scaled up for power levels. Includes laser, optics, thermal, structure. 15-50kg range, 25kg mode for 500W-class system."
        distribution:
          type: triangular
          low: 15
          mode: 25
          high: 50
      rx_mass_kg:
        value: 8
        unit: "kg"
        description: "Receiver module mass"
        justification: "PV panel + power electronics + mounting structure. Must be light enough to justify vs battery mass it replaces. 4-15kg range, 8kg mode."
        distribution:
          type: triangular
          low: 4
          mode: 8
          high: 15
      ops_cost_k_yr:
        value: 30
        unit: "$k/yr"
        description: "Annual operations and ground segment cost"
        justification: "Covers mission control staffing share, software maintenance, ground station uplink time, insurance. $15-60k range based on analogous small satellite operations."
        distribution:
          type: triangular
          low: 15
          mode: 30
          high: 60
      ground_segment_k:
        value: 50
        unit: "$k"
        description: "One-time ground segment setup cost"
        justification: "Ground station equipment, software development, testing and commissioning. Shared across multiple customers. $20-100k range."
        distribution:
          type: triangular
          low: 20
          mode: 50
          high: 100

    economic:
      wtp_per_W:
        value: 220
        unit: "$/W"
        description: "Customer willingness to pay per watt of eclipse power"
        justification: "Must be below incumbent cost ($300/W) to be attractive. $220/W mode gives ~27% saving. Lower bound $100/W reflects highly price-sensitive customers. Upper bound $400/W reflects customers valuing operational continuity and willing to pay near-incumbent prices."
        distribution:
          type: triangular
          low: 100
          mode: 220
          high: 400
      amortization_years:
        value: 7
        unit: "years"
        description: "System operational lifetime"
        justification: "Typical LEO satellite mission lifetime 5-10 years. 7 years mode reflects standard smallsat design life. Triangular captures uncertainty in technology longevity."
        distribution:
          type: triangular
          low: 5
          mode: 7
          high: 10
      addressable_units:
        value: 200
        unit: "satellites"
        description: "Number of LEO satellites that could benefit"
        justification: "~7000+ active LEO satellites as of 2025. Most are constellation sats with standardised power. Estimate 200-800 non-constellation LEO sats where bespoke power solutions matter. Lower bound 50 for very conservative early market."
        distribution:
          type: triangular
          low: 50
          mode: 200
          high: 800
      penetration_rate:
        value: 0.05
        unit: "fraction"
        description: "Realistic near-term market capture rate"
        justification: "Novel technology, long sales cycles in space industry. 1-5% penetration typical for new space services in first 5 years. Upper bound 15% reflects optimistic scenario with strong customer pull."
        distribution:
          type: triangular
          low: 0.01
          mode: 0.05
          high: 0.15

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Shadow / Low-Illumination Power
  # ─────────────────────────────────────────────────────────────────────────────
  shadow_power:
    meta:
      name: "Shadow / Low-Illumination Power"
      slug: "shadow_power"
      description: "Power delivery to spacecraft or surface assets in permanently shadowed regions (e.g. lunar south pole craters, asteroid shadows)."
      category: "Power Delivery"
      time_horizon: "Near-term"
      model_class: "StandardPowerModel"
      notion_capabilities:
        - "Power available in shadowed or low-illumination regions"

      model_prose: |
        Permanently shadowed regions (PSRs) — such as lunar south pole craters — contain
        valuable water ice but receive no sunlight. Current solutions are RTGs (expensive,
        export-controlled, limited availability) or accepting mission downtime. NEOWATT can
        relay power from a sunlit orbital position or hilltop transmitter to assets operating
        in shadow. The high WTP reflects the extreme scarcity of alternatives and the high
        value of continuous operations in these regions.

      model_maths: |
        **Revenue model (annual):**
        $$R = P_{delivered} \times WTP_{/W} \times \delta_{shadow} \times \alpha$$

        **Cost model:** Same structure as LEO Eclipse — CAPEX (TX + RX + launch + ground) + annual OPEX.

        **Key difference from LEO Eclipse:** Much higher WTP ($1500/W vs $220/W) due to lack
        of alternatives, but smaller addressable market (30 missions vs 200 satellites).

    incumbent:
      name: "Nuclear (RTG) or mission downtime"
      cost_per_W:
        value: 2000
        unit: "$/W"
        description: "RTG cost per watt or economic cost of mission downtime"
        justification: "NASA MMRTG costs ~$100M for ~110W = ~$900k/W at unit level. Commercial RTG alternatives emerging but still $1000-4000/W range. Mission downtime cost is harder to quantify but represents lost science/commercial value. $2000/W mode is conservative mid-range."
        distribution:
          type: triangular
          low: 1000
          mode: 2000
          high: 4000

    technical:
      power_delivered_W:
        value: 300
        unit: "W"
        description: "Power delivered to shadowed region assets"
        justification: "Lunar surface operations need 50-1000W depending on scale. 300W mode covers a small rover or science station. Low 50W for minimal survival heating, high 1000W for ISRU precursor operations."
        distribution:
          type: triangular
          low: 50
          mode: 300
          high: 1000
      distance_km:
        value: 100
        unit: "km"
        description: "Orbital relay to surface or inter-crater distance"
        justification: "If TX is on a lunar orbiter: ~100km altitude typical for polar orbit. If TX is on a crater rim: 1-10km. Triangular 10-500km covers both scenarios."
        distribution:
          type: triangular
          low: 10
          mode: 100
          high: 500
      link_efficiency:
        value: 0.15
        unit: "fraction"
        description: "End-to-end link efficiency"
        justification: "No atmospheric losses (vacuum). Higher than LEO Eclipse due to shorter range and no atmosphere. 6-30% range, 15% mode."
        distribution:
          type: triangular
          low: 0.06
          mode: 0.15
          high: 0.30
      duty_cycle:
        value: 0.50
        unit: "fraction"
        description: "Fraction of time in shadow requiring power"
        justification: "Uniform because it depends on the specific PSR geometry and mission profile. Some assets operate continuously in shadow (high duty), others make excursions (lower duty)."
        distribution:
          type: uniform
          low: 0.30
          high: 0.80
      availability:
        value: 0.85
        unit: "fraction"
        description: "System availability"
        justification: "Lunar environment introduces dust contamination and thermal cycling challenges. 70-95% range, 85% mode reflecting immature operational environment."
        distribution:
          type: triangular
          low: 0.70
          mode: 0.85
          high: 0.95

    cost:
      tx_hardware_k:
        value: 250
        unit: "$k"
        description: "Transmitter payload hardware cost"
        justification: "Higher than LEO due to lunar-rated components and radiation hardening. $150-500k range."
        distribution:
          type: triangular
          low: 150
          mode: 250
          high: 500
      rx_hardware_k:
        value: 80
        unit: "$k"
        description: "Receiver module cost"
        justification: "Lunar-surface-rated PV receiver with dust mitigation. $40-160k range."
        distribution:
          type: triangular
          low: 40
          mode: 80
          high: 160
      tx_mass_kg:
        value: 35
        unit: "kg"
        description: "Transmitter mass"
        justification: "Heavier than LEO Eclipse due to radiation shielding and larger optics for surface targeting. 20-70kg."
        distribution:
          type: triangular
          low: 20
          mode: 35
          high: 70
      rx_mass_kg:
        value: 10
        unit: "kg"
        description: "Receiver mass"
        justification: "Surface-mounted PV + tracking system. 5-20kg range."
        distribution:
          type: triangular
          low: 5
          mode: 10
          high: 20
      ops_cost_k_yr:
        value: 50
        unit: "$k/yr"
        description: "Annual operations cost"
        justification: "Higher than LEO due to deep-space operations complexity. $25-100k range."
        distribution:
          type: triangular
          low: 25
          mode: 50
          high: 100
      ground_segment_k:
        value: 40
        unit: "$k"
        description: "One-time ground segment cost"
        justification: "Uses existing deep-space network infrastructure. $15-80k for NEOWATT-specific setup."
        distribution:
          type: triangular
          low: 15
          mode: 40
          high: 80

    economic:
      wtp_per_W:
        value: 1500
        unit: "$/W"
        description: "Customer WTP per watt in shadowed regions"
        justification: "Very high WTP driven by lack of alternatives. RTGs cost $1000-4000/W. Customers would pay up to near-RTG prices for a non-nuclear alternative. $500/W lower bound for price-sensitive missions, $3000/W upper for government/exploration missions."
        distribution:
          type: triangular
          low: 500
          mode: 1500
          high: 3000
      amortization_years:
        value: 8
        unit: "years"
        description: "System operational lifetime"
        justification: "Lunar missions tend toward longer lifetimes (Artemis programme is multi-decade). 5-12 year range for hardware amortization."
        distribution:
          type: triangular
          low: 5
          mode: 8
          high: 12
      addressable_units:
        value: 30
        unit: "missions"
        description: "Number of PSR missions that could benefit"
        justification: "Relatively small market: Artemis base camp, CLPS landers, ESA lunar missions, commercial lunar ventures. 5-100 missions over the next decade."
        distribution:
          type: triangular
          low: 5
          mode: 30
          high: 100
      penetration_rate:
        value: 0.10
        unit: "fraction"
        description: "Market capture rate"
        justification: "Higher than LEO because fewer alternatives exist. 3-25% range, 10% mode."
        distribution:
          type: triangular
          low: 0.03
          mode: 0.10
          high: 0.25

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Peak Power on Demand
  # ─────────────────────────────────────────────────────────────────────────────
  peak_power:
    meta:
      name: "Peak Power on Demand"
      slug: "peak_power"
      description: "Burst power delivery for high-demand operations: SAR imaging, laser comms, orbital manoeuvres, electronic warfare."
      category: "Power Delivery"
      time_horizon: "Near-term"
      model_class: "PeakPowerModel"
      notion_capabilities:
        - "Higher peak power on demand"
        - "Purchase power during high-demand phases"

      model_prose: |
        Many satellite operations require burst power far exceeding average consumption:
        SAR radar imaging (kW-class pulses), laser communication links, electric propulsion
        burns, or electronic warfare payloads. Currently, satellites must size their solar
        arrays and batteries for these peak demands, even though they only occur for minutes
        or hours per day. NEOWATT provides burst power on demand, so satellites can be designed
        for average power needs only. The customer saves on the capital cost of oversizing.

      model_maths: |
        **Revenue model (annual, burst pricing):**
        $$R = WTP_{/kWh} \times P_{kW} \times t_{burst} \times N_{events} \times \alpha$$

        Where:
        - $WTP_{/kWh}$ = willingness to pay per kWh of burst power
        - $P_{kW}$ = peak power delivered (kW)
        - $t_{burst}$ = duration of each burst event (hours)
        - $N_{events}$ = number of burst events per year
        - $\alpha$ = system availability

        **Cost model:** Same CAPEX/OPEX structure as standard power delivery.

        **Customer saving:** Compares our total lifetime $/W-peak against the incumbent cost
        of sizing arrays + batteries for peak demand.

    incumbent:
      name: "Oversized solar arrays + battery packs"
      cost_per_W:
        value: 350
        unit: "$/W"
        description: "Cost of sizing arrays and batteries for peak demand"
        justification: "Peak power sizing forces ~2-3x overbuild on solar arrays and ~3-5x on batteries. At $200-600/W system level for peak capability (vs $100-300/W for average), $350/W mode is reasonable."
        distribution:
          type: triangular
          low: 200
          mode: 350
          high: 600

    technical:
      power_delivered_W:
        value: 2000
        unit: "W"
        description: "Peak burst power delivered"
        justification: "SAR payloads need 1-5kW peak. Laser comms 0.5-2kW. Electric propulsion 1-10kW. 2kW mode covers most near-term applications."
        distribution:
          type: triangular
          low: 500
          mode: 2000
          high: 5000
      distance_km:
        value: 500
        unit: "km"
        description: "TX-to-RX distance during burst"
        justification: "LEO-to-LEO ranges. Shorter than eclipse case because burst events can be scheduled for close approach geometry."
        distribution:
          type: triangular
          low: 200
          mode: 500
          high: 1500
      link_efficiency:
        value: 0.12
        unit: "fraction"
        description: "Link efficiency"
        justification: "Same technology chain as LEO Eclipse. 5-25% range."
        distribution:
          type: triangular
          low: 0.05
          mode: 0.12
          high: 0.25
      burst_duration_hrs:
        value: 2.0
        unit: "hours"
        description: "Duration of each high-demand burst"
        justification: "SAR imaging passes: 10-30 minutes. Electric propulsion burns: 1-6 hours. Laser comms sessions: 0.5-2 hours. Triangular 0.5-6 hours, mode 2 hours covers most scenarios."
        distribution:
          type: triangular
          low: 0.5
          mode: 2.0
          high: 6.0
      events_per_year:
        value: 100
        unit: "events/yr"
        description: "Number of burst power events per year per customer"
        justification: "Depends heavily on customer mission. EO satellites image ~1-5 times per orbit (~15 orbits/day), but not all passes need burst power. 20-365 events/year range, 100 mode."
        distribution:
          type: triangular
          low: 20
          mode: 100
          high: 365
      availability:
        value: 0.85
        unit: "fraction"
        description: "System availability for burst events"
        justification: "Must have TX in position when burst is needed. Scheduling constraints reduce availability vs continuous service."
        distribution:
          type: triangular
          low: 0.70
          mode: 0.85
          high: 0.95

    cost:
      tx_hardware_k:
        value: 200
        unit: "$k"
        description: "Transmitter hardware cost"
        justification: "Needs higher peak power laser than eclipse case but shorter duty cycle reduces thermal requirements. $100-400k range."
        distribution:
          type: triangular
          low: 100
          mode: 200
          high: 400
      rx_hardware_k:
        value: 50
        unit: "$k"
        description: "Receiver module cost"
        justification: "Standard PV receiver, slightly larger area for higher power. $25-100k range."
        distribution:
          type: triangular
          low: 25
          mode: 50
          high: 100
      tx_mass_kg:
        value: 30
        unit: "kg"
        description: "TX mass"
        justification: "Higher power laser but pulsed operation reduces thermal mass. 15-60kg."
        distribution:
          type: triangular
          low: 15
          mode: 30
          high: 60
      rx_mass_kg:
        value: 6
        unit: "kg"
        description: "RX mass"
        justification: "Compact receiver for burst power capture. 3-12kg."
        distribution:
          type: triangular
          low: 3
          mode: 6
          high: 12
      ops_cost_k_yr:
        value: 35
        unit: "$k/yr"
        description: "Annual operations cost"
        justification: "Burst scheduling adds operational complexity over continuous service. $15-70k range."
        distribution:
          type: triangular
          low: 15
          mode: 35
          high: 70
      ground_segment_k:
        value: 40
        unit: "$k"
        description: "Ground segment cost"
        justification: "Standard ground infrastructure. $15-80k."
        distribution:
          type: triangular
          low: 15
          mode: 40
          high: 80

    economic:
      wtp_per_kWh:
        value: 500
        unit: "$/kWh"
        description: "Willingness to pay per kWh of burst power"
        justification: "Space electricity is extremely expensive. ISS solar array cost ~$1B for ~240kW = effective >$10,000/kWh over lifetime. For burst operations, customers pay a premium for on-demand availability. $100-2000/kWh range, $500/kWh mode."
        distribution:
          type: triangular
          low: 100
          mode: 500
          high: 2000
      amortization_years:
        value: 7
        unit: "years"
        description: "System lifetime"
        justification: "Standard LEO mission lifetime."
        distribution:
          type: triangular
          low: 5
          mode: 7
          high: 10
      addressable_units:
        value: 150
        unit: "satellites"
        description: "Satellites needing burst power"
        justification: "SAR, laser comms, EW, and electric propulsion satellites. Growing market. 30-500 range."
        distribution:
          type: triangular
          low: 30
          mode: 150
          high: 500
      penetration_rate:
        value: 0.05
        unit: "fraction"
        description: "Market capture rate"
        justification: "Novel concept requiring mission redesign. Conservative 1-15% range."
        distribution:
          type: triangular
          low: 0.01
          mode: 0.05
          high: 0.15

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Satellite Life Extension
  # ─────────────────────────────────────────────────────────────────────────────
  satellite_life_extension:
    meta:
      name: "Satellite Life Extension"
      slug: "satellite_life_extension"
      description: "Extend operational lifetimes of high-value GEO/MEO satellites with degraded power systems."
      category: "Power Delivery"
      time_horizon: "Mid-term"
      model_class: "LifeExtensionModel"
      notion_capabilities:
        - "Extension of satellite operational lifetimes"

      model_prose: |
        GEO communications satellites generate $50-200M/year in revenue but are typically
        retired after 15 years when solar array degradation reduces available power below
        minimum operational thresholds. The satellite bus and transponders often have remaining
        useful life. NEOWATT beams supplemental power to restore the satellite to full
        operational capacity, extending revenue-generating life by 1-5 years. The revealed
        WTP anchor is the Intelsat/Northrop Grumman MEV-1 contract at ~$13M/year for life
        extension via docking — NEOWATT offers a non-contact alternative.

      model_maths: |
        **Revenue model (annual):**
        $$R = P_{service/yr}$$
        Where $P_{service/yr}$ is the annual service fee charged per satellite.

        **Cost model:** Same CAPEX/OPEX structure.

        **Customer saving:**
        $$S = \frac{C_{incumbent/yr} - P_{service/yr}}{C_{incumbent/yr}}$$
        Where $C_{incumbent/yr}$ is the annualised cost of alternatives (MEV contract or
        replacement satellite amortised).

        **Market sizing:**
        $$TAM = P_{service/yr} \times N_{years\_extended} \times N_{addressable}$$

    incumbent:
      name: "Replacement launch or MEV-style docking"
      cost_per_year_k:
        value: 13000
        unit: "$k/yr"
        description: "Revealed WTP from Intelsat/MEV-1 contract (~$13M/yr)"
        justification: "Northrop Grumman MEV-1 docked with Intelsat 901 in 2020 under a ~5-year contract worth an estimated $65M total (~$13M/yr). This is the best available revealed preference data for satellite life extension WTP. Range $8-20M/yr reflects variation across satellite revenue profiles."
        distribution:
          type: triangular
          low: 8000
          mode: 13000
          high: 20000
      replacement_cost_k:
        value: 300000
        unit: "$k"
        description: "Full satellite replacement cost (build + launch)"
        justification: "GEO comms satellite: $150-300M build + $50-150M launch. Total $200-500M, mode $300M."
        distribution:
          type: triangular
          low: 200000
          mode: 300000
          high: 500000

    technical:
      power_delivered_W:
        value: 1000
        unit: "W"
        description: "Power delivered to ageing satellite"
        justification: "GEO satellites lose 1-3% solar array power per year. After 15 years, that's 15-45% degradation. For a 10kW satellite, restoring 500-3000W extends operational capability. 1kW mode."
        distribution:
          type: triangular
          low: 500
          mode: 1000
          high: 3000
      distance_km:
        value: 36000
        unit: "km"
        description: "GEO orbit distance"
        justification: "GEO is at ~35,786 km altitude. Very narrow range. Uniform 35000-37000km to cover co-located or slightly offset TX positioning."
        distribution:
          type: uniform
          low: 35000
          high: 37000
      link_efficiency:
        value: 0.06
        unit: "fraction"
        description: "Long-range link efficiency at GEO distances"
