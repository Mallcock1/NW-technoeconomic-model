      launch_cost_per_kg:
        value: 5000
        unit: $/kg
        description: Rideshare launch cost to orbit (Falcon 9 class)
        justification: Primarily relevant for RX delivery to HAPS platform (air-launched or ground-integrated). Ground-based
          TX does not need orbital launch. Using standard rideshare cost for RX mass calculation.
        distribution: &id001
          type: triangular
          low: 2500
          mode: 5000
          high: 8000
        trajectory:
          years:
          - 2025
          - 2027
          - 2030
          - 2035
          values:
          - 5000
          - 3500
          - 2000
          - 1000
          description: Projected launch cost decline driven by Starship and reusability
        confidence: measured
        source: SpaceX Falcon 9 rideshare published pricing
      tx_sale_price_k:
        value: 192
        unit: $k
        description: Sale price of TX payload to customer
        justification: Manufacturing cost $120k with ~160% gross margin on hardware.
        confidence: guessed
        source: Target hardware margin for space components
        distribution:
          type: triangular
          low: 134
          mode: 192
          high: 288
      rx_sale_price_k:
        value: 60
        unit: $k
        description: Sale price of RX module to customer
        justification: Manufacturing cost $40k with ~150% gross margin on hardware.
        confidence: guessed
