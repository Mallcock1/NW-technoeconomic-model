use_cases:
  peak_power:
    meta:
      name: Peak Power on Demand
      slug: peak_power
      description: 'Burst power delivery for high-demand operations: SAR imaging, laser comms, orbital manoeuvres, electronic
        warfare.'
      category: Power Delivery
      time_horizon: Near-term
      model_class: PeakPowerModel
      notion_capabilities:
      - Higher peak power on demand
      - Purchase power during high-demand phases
      model_prose: 'Many satellite operations require burst power far exceeding average consumption:

        SAR radar imaging (kW-class pulses), laser communication links, electric propulsion

        burns, or electronic warfare payloads. Currently, satellites must size their solar

        arrays and batteries for these peak demands, even though they only occur for minutes

        or hours per day. NEOWATT provides burst power on demand, so satellites can be designed

        for average power needs only. The customer saves on the capital cost of oversizing.

        '
      model_maths: '**Revenue model (annual, burst pricing):**

        $$R = WTP_{/kWh} \times P_{kW} \times t_{burst} \times N_{events} \times \alpha$$


        Where:

        - $WTP_{/kWh}$ = willingness to pay per kWh of burst power

        - $P_{kW}$ = peak power delivered (kW)

        - $t_{burst}$ = duration of each burst event (hours)

        - $N_{events}$ = number of burst events per year

        - $\alpha$ = system availability


        **Cost model:** Same CAPEX/OPEX structure as standard power delivery.


        **Customer saving:** Compares our total lifetime $/W-peak against the incumbent cost

        of sizing arrays + batteries for peak demand.

        '
    incumbent:
      name: Oversized solar arrays + battery packs
      cost_per_W:
        value: 350
        unit: $/W
        description: Cost of sizing arrays and batteries for peak demand
        justification: Peak power sizing forces ~2-3x overbuild on solar arrays and ~3-5x on batteries. At $200-600/W system
          level for peak capability (vs $100-300/W for average), $350/W mode is reasonable.
        distribution:
          type: triangular
          low: 200
          mode: 350
          high: 600
        confidence: estimated
        source: Industry cost models, smallsat vendor quotes
    technical:
      power_delivered_W:
        value: 2000
        unit: W
        description: Peak burst power delivered
        justification: SAR payloads need 1-5kW peak. Laser comms 0.5-2kW. Electric propulsion 1-10kW. 2kW mode covers most
          near-term applications.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      distance_km:
        value: 500
        unit: km
        description: TX-to-RX distance during burst
        justification: LEO-to-LEO ranges. Shorter than eclipse case because burst events can be scheduled for close approach
          geometry.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      link_efficiency:
        value: 0.12
        unit: fraction
        description: Link efficiency
        justification: Same technology chain as LEO Eclipse. 5-25% range.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      burst_duration_hrs:
        value: 2.0
        unit: hours
        description: Duration of each high-demand burst
        justification: 'SAR imaging passes: 10-30 minutes. Electric propulsion burns: 1-6 hours. Laser comms sessions: 0.5-2
          hours. Triangular 0.5-6 hours, mode 2 hours covers most scenarios.'
        confidence: estimated
        source: NEOWATT internal engineering analysis
      events_per_year:
        value: 100
        unit: events/yr
        description: Number of burst power events per year per customer
        justification: Depends heavily on customer mission. EO satellites image ~1-5 times per orbit (~15 orbits/day), but
          not all passes need burst power. 20-365 events/year range, 100 mode.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      availability:
        value: 0.85
        unit: fraction
        description: System availability for burst events
        justification: Must have TX in position when burst is needed. Scheduling constraints reduce availability vs continuous
          service.
        confidence: estimated
        source: NEOWATT internal engineering analysis
    cost:
      tx_hardware_k:
        value: 200
        unit: $k
        description: Transmitter hardware cost
        justification: Needs higher peak power laser than eclipse case but shorter duty cycle reduces thermal requirements.
          $100-400k range.
        distribution:
          type: triangular
          low: 100
          mode: 200
          high: 400
        confidence: estimated
        source: Component-level cost build-up from vendor quotes
      rx_hardware_k:
        value: 50
        unit: $k
        description: Receiver module cost
        justification: Standard PV receiver, slightly larger area for higher power. $25-100k range.
        distribution:
          type: triangular
          low: 25
          mode: 50
          high: 100
        confidence: estimated
        source: Component-level cost build-up from vendor quotes
      tx_mass_kg:
        value: 30
        unit: kg
        description: TX mass
        justification: Higher power laser but pulsed operation reduces thermal mass. 15-60kg.
        distribution:
          type: triangular
          low: 15
          mode: 30
          high: 60
        confidence: estimated
        source: Analogous laser terminal mass budgets
      rx_mass_kg:
        value: 6
        unit: kg
        description: RX mass
        justification: Compact receiver for burst power capture. 3-12kg.
        distribution:
          type: triangular
          low: 3
          mode: 6
          high: 12
        confidence: estimated
        source: PV receiver mass budget analysis
      ops_cost_k_yr:
        value: 35
        unit: $k/yr
        description: Annual operations cost
        justification: Burst scheduling adds operational complexity over continuous service. $15-70k range.
        distribution:
          type: triangular
          low: 15
          mode: 35
          high: 70
        confidence: guessed
        source: Analogous smallsat operations costs
      ground_segment_k:
        value: 40
        unit: $k
        description: Ground segment cost
        justification: Standard ground infrastructure. $15-80k.
        distribution:
          type: triangular
          low: 15
          mode: 40
          high: 80
        confidence: guessed
        source: Ground station infrastructure estimates
    economic:
      wtp_per_kWh:
        value: 500
        unit: $/kWh
        description: Willingness to pay per kWh of burst power
        justification: Space electricity is extremely expensive. ISS solar array cost ~$1B for ~240kW = effective >$10,000/kWh
          over lifetime. For burst operations, customers pay a premium for on-demand availability. $100-2000/kWh range, $500/kWh
          mode.
        distribution:
          type: triangular
          low: 100
          mode: 500
          high: 2000
        confidence: guessed
        source: ISS power cost analogy; no direct validation
      amortization_years:
        value: 7
        unit: years
        description: System lifetime
        justification: Standard LEO mission lifetime.
        distribution:
          type: triangular
          low: 5
          mode: 7
          high: 10
        confidence: estimated
        source: Standard satellite mission lifetime assumptions
      addressable_units:
        value: 150
        unit: satellites
        description: Satellites needing burst power
        justification: SAR, laser comms, EW, and electric propulsion satellites. Growing market. 30-500 range.
        distribution:
          type: triangular
          low: 30
          mode: 150
          high: 500
        confidence: estimated
        source: UCS satellite database, market reports
      penetration_rate:
        value: 0.05
        unit: fraction
        description: Market capture rate
        justification: Novel concept requiring mission redesign. Conservative 1-15% range.
        distribution:
          type: triangular
          low: 0.01
          mode: 0.05
          high: 0.15
        confidence: guessed
        source: Analogous new space service adoption rates
      launch_cost_per_kg:
        value: 5000
        unit: $/kg
        description: Rideshare launch cost to orbit (Falcon 9 class)
        justification: Current Falcon 9 rideshare ~$5000/kg. SpaceX Starship projected to reach $1000-2000/kg by 2030. Range
          $2500-8000/kg covers near-term uncertainty. Will decline over time as reusability matures.
        distribution: &id001
          type: triangular
          low: 2500
          mode: 5000
          high: 8000
        trajectory:
          years:
          - 2025
          - 2027
          - 2030
          - 2035
          values:
          - 5000
          - 3500
          - 2000
          - 1000
          description: Projected launch cost decline driven by Starship and reusability
        confidence: measured
        source: SpaceX Falcon 9 rideshare published pricing
  satellite_life_extension:
    meta:
      name: Satellite Life Extension
      slug: satellite_life_extension
      description: Extend operational lifetimes of high-value GEO/MEO satellites with degraded power systems.
      category: Power Delivery
      time_horizon: Mid-term
      model_class: LifeExtensionModel
      notion_capabilities:
      - Extension of satellite operational lifetimes
      model_prose: 'GEO communications satellites generate $50-200M/year in revenue but are typically

        retired after 15 years when solar array degradation reduces available power below

        minimum operational thresholds. The satellite bus and transponders often have remaining

        useful life. NEOWATT beams supplemental power to restore the satellite to full

        operational capacity, extending revenue-generating life by 1-5 years. The revealed

        WTP anchor is the Intelsat/Northrop Grumman MEV-1 contract at ~$13M/year for life

        extension via docking – NEOWATT offers a non-contact alternative.

        '
      model_maths: '**Revenue model (annual):**

        $$R = P_{service/yr}$$

        Where $P_{service/yr}$ is the annual service fee charged per satellite.


        **Cost model:** Same CAPEX/OPEX structure.


        **Customer saving:**

        $$S = \frac{C_{incumbent/yr} - P_{service/yr}}{C_{incumbent/yr}}$$

        Where $C_{incumbent/yr}$ is the annualised cost of alternatives (MEV contract or

        replacement satellite amortised).


        **Market sizing:**

        $$TAM = P_{service/yr} \times N_{years\_extended} \times N_{addressable}$$

        '
    incumbent:
      name: Replacement launch or MEV-style docking
      cost_per_year_k:
        value: 13000
        unit: $k/yr
        description: Revealed WTP from Intelsat/MEV-1 contract (~$13M/yr)
        justification: Northrop Grumman MEV-1 docked with Intelsat 901 in 2020 under a ~5-year contract worth an estimated
          $65M total (~$13M/yr). This is the best available revealed preference data for satellite life extension WTP. Range
          $8-20M/yr reflects variation across satellite revenue profiles.
        distribution:
          type: triangular
          low: 8000
          mode: 13000
          high: 20000
        confidence: measured
        source: Intelsat/MEV-1 contract (~$13M/yr revealed WTP)
      replacement_cost_k:
        value: 300000
        unit: $k
        description: Full satellite replacement cost (build + launch)
        justification: 'GEO comms satellite: $150-300M build + $50-150M launch. Total $200-500M, mode $300M.'
        distribution:
          type: triangular
          low: 200000
          mode: 300000
          high: 500000
        confidence: estimated
        source: GEO satellite build + launch cost estimates
    technical:
      power_delivered_W:
        value: 1000
        unit: W
        description: Power delivered to ageing satellite
        justification: GEO satellites lose 1-3% solar array power per year. After 15 years, that's 15-45% degradation. For
          a 10kW satellite, restoring 500-3000W extends operational capability. 1kW mode.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      distance_km:
        value: 36000
        unit: km
        description: GEO orbit distance
        justification: GEO is at ~35,786 km altitude. Very narrow range. Uniform 35000-37000km to cover co-located or slightly
          offset TX positioning.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      link_efficiency:
        value: 0.06
        unit: fraction
        description: Long-range link efficiency at GEO distances
        justification: Much longer range than LEO cases means higher beam divergence losses. 2-12% range. Ground-to-GEO through
          atmosphere is worst case; GEO-to-GEO relay is better.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      years_extended:
        value: 3
        unit: years
        description: Additional operational years enabled
        justification: MEV-1 contract is ~5 years. Practical extension depends on non-power subsystem health. 1-5 years range,
          3 years mode.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      availability:
        value: 0.95
        unit: fraction
        description: System availability
        justification: GEO has favourable geometry (continuous visibility). High availability achievable. 85-99% range.
        confidence: estimated
        source: NEOWATT internal engineering analysis
    cost:
      tx_hardware_k:
        value: 350
        unit: $k
        description: Transmitter hardware cost
        justification: GEO-rated, higher power for long range. Radiation-hardened components. $200-700k range.
        distribution:
          type: triangular
          low: 200
          mode: 350
          high: 700
        confidence: estimated
        source: Component-level cost build-up from vendor quotes
      rx_hardware_k:
        value: 100
        unit: $k
        description: Receiver module cost
        justification: Must retrofit to existing satellite (challenging) or be pre-integrated on new builds. Higher cost due
          to GEO qualification. $50-200k range.
        distribution:
          type: triangular
          low: 50
          mode: 100
          high: 200
        confidence: estimated
        source: Component-level cost build-up from vendor quotes
      tx_mass_kg:
        value: 50
        unit: kg
        description: TX mass
        justification: Larger optics needed for GEO-range beam control. 30-100kg.
        distribution:
          type: triangular
          low: 30
          mode: 50
          high: 100
        confidence: estimated
        source: Analogous laser terminal mass budgets
      rx_mass_kg:
        value: 12
        unit: kg
        description: RX mass
        justification: GEO-qualified PV receiver. 6-25kg.
        distribution:
          type: triangular
          low: 6
          mode: 12
          high: 25
        confidence: estimated
        source: PV receiver mass budget analysis
      ops_cost_k_yr:
        value: 60
