  remote_power_delivery:
    meta:
      name: Remote Power Delivery
      slug: remote_power_delivery
      description: Decouple power generation from power consumption by beaming power between separate orbital assets. Enables
        independent lifecycle management -- e.g. solar arrays last 15+ years but compute chips become obsolete in 3-5 years.
      category: Power Delivery
      time_horizon: Mid-term
      model_class: StandardPowerModel
      model_prose: 'Current spacecraft tightly couple power generation (solar arrays) with power consumption (payload). This
        means when the payload becomes obsolete (e.g. compute chips every 3-5 years), the still-functional solar arrays are
        deorbited with it. Conversely, when arrays degrade, a perfectly good payload loses power. NEOWATT enables decoupling:
        a long-lived solar generation platform beams power to short-lived consumer modules. Key application: orbital compute,
        where chip generations turn over rapidly but power infrastructure can serve 15+ years. Also relevant for any architecture
        where generation and consumption have mismatched lifetimes or where co-location is impractical.'
      model_maths: '**Revenue model (annual):**

        $$R = P_{delivered} \times WTP_{/W} \times \delta \times \alpha$$


        **Customer saving:**

        $$S = \frac{C_{incumbent/W} - WTP_{/W}}{C_{incumbent/W}}$$


        **Key value driver:** Avoided cost of replacing solar arrays each time a payload module is swapped. Over multiple
        payload generations, the cumulative saving from reusing power infrastructure grows.'
    incumbent:
      name: Co-located solar arrays on each payload module
      cost_per_W:
        value: 300
        unit: $/W
        description: Cost per watt of solar arrays that are discarded with each payload swap
        justification: 'Each payload module carries its own arrays. For orbital compute, a 3-5 year chip lifecycle means arrays
