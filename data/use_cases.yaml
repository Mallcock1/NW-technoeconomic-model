  peak_power:
    meta:
      name: Peak Power on Demand
      slug: peak_power
      description: 'Customer: satellite operators needing burst power for SAR imaging, laser comms, electric propulsion, or
        electronic warfare. Problem: satellites must size solar arrays and batteries for peak demand even though peaks are
        infrequent. Solution: NEOWATT sells a TX payload and RX modules that the customer integrates within their own constellation
        or co-manifested assets. The customer schedules burst power delivery using their own mission planning. Architecture:
        same rationale as LEO Duty Cycle Extension -- the customer operates both sides and does not want third-party satellites
        in their orbit.'
      category: Power Delivery
      time_horizon: Near-term
      model_class: HardwareSaleModel
      notion_capabilities:
      - Higher peak power on demand
      - Purchase power during high-demand phases
      model_prose: NEOWATT manufactures and sells a TX payload and RX modules to the customer. Revenue is the hardware sale
        price (annualised over the system lifetime) plus an annual support fee. NEOWATT's costs are manufacturing and ground
        support only -- the customer pays for their own launch. The customer saving compares the total hardware cost per watt-peak
        against the incumbent cost of oversizing solar arrays and batteries to handle peak demand events.
      model_maths: '**Annual revenue:**

        $$R = \frac{S_{tx} + S_{rx}}{Y} + F_{support}$$


        **NEOWATT CAPEX (manufacturing):**

        $$C_{capex} = C_{tx} + C_{rx} + C_{ground}$$


        **Annual OPEX:** $C_{ops}$


        **Customer''s total cost per watt-peak:**

        $$P_{cust} = \frac{S_{tx} + S_{rx}}{P}$$


        - $P$ = peak power delivered (W)


        **Customer saving:** $S = (C_{inc} - P_{cust}) / C_{inc}$'
    incumbent:
      name: Oversized solar arrays + battery packs
      cost_per_W:
        value: 350
        unit: $/W
        description: Cost of sizing arrays and batteries for peak demand
        justification: Peak power sizing forces ~2-3x overbuild on solar arrays and ~3-5x on batteries. At $200-600/W system
          level for peak capability (vs $100-300/W for average), $350/W mode is reasonable.
        distribution:
          type: triangular
          low: 200
          mode: 350
          high: 600
        confidence: estimated
        source: Industry cost models, smallsat vendor quotes
