      penetration_rate:
        value: 0.05
        unit: fraction
        description: Realistic near-term market capture rate
        justification: Novel technology, long sales cycles in space industry. 1-5% penetration typical for new space services
          in first 5 years. Upper bound 15% reflects optimistic scenario with strong customer pull.
        distribution:
          type: triangular
