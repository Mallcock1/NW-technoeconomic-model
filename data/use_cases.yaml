  haps_power:
    meta:
      name: HAPS Power (Terrestrial)
      slug: haps_power
      description: Ground-to-HAPS laser power beaming for indefinite station-keeping of high-altitude pseudo-satellites.
      category: Power Delivery
      time_horizon: Near-term
      model_class: StandardPowerModel
      model_prose: 'High Altitude Pseudo-Satellites (HAPS) operate at 18-22km altitude providing persistent

        surveillance, communications, or environmental monitoring. Their key limitation is

        endurance: solar-powered HAPS like Airbus Zephyr can fly for weeks but are constrained

        by overnight battery capacity and seasonal solar variation. NEOWATT beams power from

        ground stations to HAPS at short range (~20km, near-vertical), achieving high link

        efficiency thanks to minimal atmospheric path and no vacuum-to-atmosphere transition.

        This is NEOWATT''s terrestrial wedge market – near-term, lower technical risk, and a

        stepping stone to orbital systems.

        '
      model_maths: '**Revenue model (annual):**

        $$R = P_{delivered} \times WTP_{/W} \times \delta \times \alpha$$


        Same model as LEO Eclipse but with key differences:

        - Higher $\delta$ (0.60-0.95): HAPS needs near-continuous power

        - Higher link efficiency (0.12-0.35): short range, thin atmosphere at altitude

        - Lower WTP ($140/W): competing against mature solar+battery HAPS designs

        - Ground-based TX: mass is less critical, but cost still matters

        '
    incumbent:
      name: Onboard solar + battery arrays
      cost_per_W:
        value: 180
        unit: $/W
        description: Cost per watt of HAPS onboard power system
        justification: HAPS solar cells are lightweight, high-efficiency (typically IMM multi-junction). Battery packs for
          overnight operation add significant mass and cost. Total system cost $100-300/W based on Airbus Zephyr and BAE PHASA-35
          class systems.
        distribution:
          type: triangular
          low: 100
          mode: 180
          high: 300
        confidence: estimated
        source: Industry cost models, smallsat vendor quotes
    technical:
      power_delivered_W:
        value: 2000
        unit: W
        description: Power delivered to HAPS platform
        justification: Zephyr-class HAPS needs ~1.5kW average. Larger HAPS concepts need 3-5kW. 500-5000W range covers current
          and next-gen platforms.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      distance_km:
        value: 20
        unit: km
        description: Ground to HAPS altitude
        justification: HAPS fly at 18-22km (stratosphere). Slant range depends on station geometry. 15-25km near-vertical.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      link_efficiency:
        value: 0.22
        unit: fraction
        description: Short-range atmospheric link efficiency
        justification: Short path through thin upper atmosphere. Adaptive optics less needed. Best-case NEOWATT link budget.
          12-35% range, 22% mode.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      duty_cycle:
        value: 0.8
        unit: fraction
        description: Fraction of time HAPS needs beamed power
        justification: Uniform because it depends on solar availability and mission requirements. Night-only (50%) to near-continuous
          (95%) depending on latitude and season.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      availability:
        value: 0.85
        unit: fraction
        description: System availability
        justification: 'Weather is the main limiter: clouds, rain, turbulence affect uplink. Ground-based system has easier
          maintenance. 65-95% range depending on location.'
        confidence: estimated
        source: NEOWATT internal engineering analysis
    cost:
      tx_hardware_k:
        value: 120
        unit: $k
        description: Ground-based transmitter cost
        justification: Ground-based means no space qualification needed – major cost reduction vs orbital TX. Commercial laser
          + tracking system. $60-250k.
        distribution:
          type: triangular
          low: 60
          mode: 120
          high: 250
        confidence: estimated
        source: Component-level cost build-up from vendor quotes
      rx_hardware_k:
        value: 40
        unit: $k
        description: HAPS receiver module cost
        justification: Must be ultra-lightweight for HAPS platform. Lightweight PV + minimal power electronics. $20-80k.
        distribution:
          type: triangular
          low: 20
          mode: 40
          high: 80
        confidence: estimated
        source: Component-level cost build-up from vendor quotes
      tx_mass_kg:
        value: 60
        unit: kg
        description: Ground TX mass
        justification: 'Ground-based: mass is not a launch cost driver but affects transportability and deployment cost. 30-120kg
          for a field-deployable system.'
        distribution:
          type: triangular
          low: 30
          mode: 60
          high: 120
        confidence: estimated
        source: Analogous laser terminal mass budgets
      rx_mass_kg:
        value: 5
        unit: kg
        description: HAPS receiver mass
        justification: Extremely mass-sensitive platform. Must be <10kg. 2-10kg range, 5kg mode.
        distribution:
          type: triangular
          low: 2
          mode: 5
          high: 10
        confidence: estimated
        source: PV receiver mass budget analysis
      ops_cost_k_yr:
        value: 20
        unit: $k/yr
        description: Annual operations
        justification: Ground-based system has low ops cost – site maintenance, power, staffing. $10-45k.
        distribution:
          type: triangular
          low: 10
          mode: 20
          high: 45
        confidence: guessed
        source: Analogous smallsat operations costs
      ground_segment_k:
        value: 80
        unit: $k
        description: Ground station infrastructure
        justification: Site preparation, power supply, enclosure, network connectivity. $30-150k.
        distribution:
          type: triangular
          low: 30
          mode: 80
          high: 150
        confidence: guessed
        source: Ground station infrastructure estimates
    economic:
      wtp_per_W:
        value: 140
        unit: $/W
        description: Customer WTP per watt for HAPS power
        justification: Must undercut incumbent ($180/W) to be attractive. $140/W gives ~22% saving. Range $60-250/W reflects
          variation from defence (higher WTP) to commercial (lower WTP) customers.
        distribution:
          type: triangular
          low: 60
          mode: 140
          high: 250
        confidence: guessed
        source: Must be below incumbent; no direct customer validation yet
      amortization_years:
        value: 10
        unit: years
        description: System lifetime
        justification: Ground TX has long life (10-15 years). HAPS platform itself may be replaced. 7-15 year range.
        distribution:
          type: triangular
          low: 7
          mode: 10
          high: 15
        confidence: estimated
        source: Standard satellite mission lifetime assumptions
      addressable_units:
        value: 100
        unit: HAPS platforms
        description: HAPS market size
        justification: HAPS market is nascent but growing. Airbus, BAE, AALTO HAPS, SoftBank HAPSMobile are active. 20-500
          platforms over next decade.
        distribution:
          type: triangular
          low: 20
          mode: 100
          high: 500
        confidence: estimated
        source: UCS satellite database, market reports
      penetration_rate:
        value: 0.08
        unit: fraction
        description: Market capture rate
        justification: NEOWATT offers a unique capability for HAPS. Strong product-market fit but small market. 2-20% range.
        distribution:
          type: triangular
          low: 0.02
          mode: 0.08
          high: 0.2
        confidence: guessed
        source: Analogous new space service adoption rates
      launch_cost_per_kg:
        value: 5000
        unit: $/kg
        description: Rideshare launch cost to orbit (Falcon 9 class)
        justification: Primarily relevant for RX delivery to HAPS platform (air-launched or ground-integrated). Ground-based
          TX does not need orbital launch. Using standard rideshare cost for RX mass calculation.
        distribution: *id001
        trajectory:
          years:
          - 2025
          - 2027
          - 2030
          - 2035
          values:
          - 5000
          - 3500
          - 2000
          - 1000
          description: Projected launch cost decline driven by Starship and reusability
        confidence: measured
        source: SpaceX Falcon 9 rideshare published pricing
  power_as_service:
    meta:
      name: Power-as-a-Service Platform
      slug: power_as_service
      description: Subscription-based power delivery, enabling CAPEX-to-OPEX shift. Decouples power generation from spacecraft
        design.
      category: Economic
      time_horizon: Mid-term
      model_class: PowerAsServiceModel
      notion_capabilities:
      - Shift from CAPEX to OPEX for power
      - Decoupling power generation from spacecraft
      - Sale of surplus power by generators
      model_prose: 'Instead of building solar arrays and batteries into every satellite, customers subscribe

        to a NEOWATT power service. A single NEOWATT TX platform serves multiple customer

        satellites, each equipped with a lightweight RX module. Customers shift from high upfront

        CAPEX (solar array + battery) to predictable OPEX (annual subscription). This benefits

        new space entrants with capital constraints and enables faster satellite development by

        removing the power subsystem design burden. At scale, NEOWATT operates like a utility –

        selling watts from orbital infrastructure.

        '
      model_maths: '**Revenue model (annual, per TX platform):**

        $$R = P_{subscription/yr} \times N_{customers}$$


        **Cost model:**

        $$C_{CAPEX} = C_{TX} + N_{customers} \times (C_{RX} + m_{RX} \times c_{launch}) + m_{TX} \times c_{launch} + C_{ground}$$

        $$C_{OPEX/yr} = C_{ops}$$


        **Customer saving:**

        $$S = \frac{C_{CAPEX\_avoided} - P_{subscription/yr} \times N_{years}}{C_{CAPEX\_avoided}}$$

        Where $C_{CAPEX\_avoided}$ is the solar array + battery cost the customer no longer needs.

        '
    incumbent:
      name: Self-provisioned onboard solar + battery
      capex_avoided_per_customer_k:
        value: 500
        unit: $k
        description: Solar array + battery CAPEX a customer avoids by subscribing
        justification: Smallsat power subsystem costs $100-500k. Larger satellites $500k-2M. $500k mode represents a medium-class
          satellite. Range $200-1200k.
        distribution:
          type: triangular
          low: 200
          mode: 500
          high: 1200
        confidence: estimated
        source: Smallsat power subsystem vendor quotes
    technical:
      power_delivered_W:
        value: 800
