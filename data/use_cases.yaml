use_cases:
  haps_power:
    meta:
      name: HAPS Power (Terrestrial)
      slug: haps_power
      description: 'Customer: HAPS platform operators (Airbus Zephyr, BAE PHASA-35, SoftBank HAPSMobile). Problem: HAPS endurance
        is limited by overnight battery capacity and seasonal solar variation. Solution: NEOWATT sells a ground-based TX unit
        that the customer installs at their ground station, plus a lightweight RX module integrated on the HAPS platform.
        Architecture: the ground TX is just equipment the HAPS operator buys and installs -- no satellite involved. This is
        NEOWATT''s terrestrial wedge market with lowest technical risk. The HAPS operator runs the whole system; NEOWATT provides
        hardware and support.'
      category: Power Delivery
      time_horizon: Near-term
      model_class: HardwareSaleModel
      model_prose: NEOWATT manufactures a ground-based TX unit and a lightweight airborne RX module, selling both to the HAPS
        operator. Revenue is the hardware sale price (annualised over the system lifetime) plus an annual support and software
        licensing fee. NEOWATT's costs are manufacturing and ground support only -- no launch costs, since the TX is ground-based
        and the customer integrates the RX on their HAPS platform. The customer saving compares the total hardware cost per
        watt against the incumbent cost of achieving the same power capability via onboard solar arrays and batteries.
      model_maths: '**Annual revenue:**

        $$R = \frac{S_{tx} + S_{rx}}{Y} + F_{support}$$


        **NEOWATT CAPEX (manufacturing):**

        $$C_{capex} = C_{tx} + C_{rx} + C_{ground}$$


        Note: no launch costs -- TX is ground-based, RX is integrated by customer.


        **Annual OPEX:** $C_{ops}$


        **Customer''s cost per watt:**

        $$P_{cust} = \frac{S_{tx} + S_{rx}}{P}$$


        **Customer saving:** $S = (C_{inc} - P_{cust}) / C_{inc}$'
    incumbent:
      name: Onboard solar + battery arrays
      cost_per_W:
        value: 180
        unit: $/W
        description: Cost per watt of HAPS onboard power system
        justification: HAPS solar cells are lightweight, high-efficiency (typically IMM multi-junction). Battery packs for
          overnight operation add significant mass and cost. Total system cost $100-300/W based on Airbus Zephyr and BAE PHASA-35
          class systems.
        distribution:
          type: triangular
          low: 100
          mode: 180
          high: 300
        confidence: estimated
        source: Industry cost models, smallsat vendor quotes
    technical:
      power_delivered_W:
        value: 2000
        unit: W
        description: Power delivered to HAPS platform
        justification: Zephyr-class HAPS needs ~1.5kW average. Larger HAPS concepts need 3-5kW. 500-5000W range covers current
          and next-gen platforms.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      distance_km:
        value: 20
        unit: km
        description: Ground to HAPS altitude
        justification: HAPS fly at 18-22km (stratosphere). Slant range depends on station geometry. 15-25km near-vertical.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      link_efficiency:
        value: 0.22
        unit: fraction
        description: Short-range atmospheric link efficiency
        justification: Short path through thin upper atmosphere. Adaptive optics less needed. Best-case NEOWATT link budget.
          12-35% range, 22% mode.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      duty_cycle:
        value: 0.8
        unit: fraction
        description: Fraction of time HAPS needs beamed power
        justification: Uniform because it depends on solar availability and mission requirements. Night-only (50%) to near-continuous
          (95%) depending on latitude and season.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      availability:
        value: 0.85
        unit: fraction
        description: System availability
        justification: 'Weather is the main limiter: clouds, rain, turbulence affect uplink. Ground-based system has easier
          maintenance. 65-95% range depending on location.'
        confidence: estimated
        source: NEOWATT internal engineering analysis
    cost:
      tx_hardware_k:
        value: 120
        unit: $k
        description: Ground-based transmitter cost
        justification: Ground-based means no space qualification needed – major cost reduction vs orbital TX. Commercial laser
          + tracking system. $60-250k.
        distribution:
          type: triangular
          low: 60
          mode: 120
          high: 250
        confidence: estimated
        source: Component-level cost build-up from vendor quotes
      rx_hardware_k:
        value: 40
        unit: $k
        description: HAPS receiver module cost
        justification: Must be ultra-lightweight for HAPS platform. Lightweight PV + minimal power electronics. $20-80k.
        distribution:
          type: triangular
          low: 20
          mode: 40
          high: 80
        confidence: estimated
