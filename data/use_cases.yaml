  satellite_life_extension:
    meta:
      name: Satellite Life Extension
      slug: satellite_life_extension
      description: 'Customer: GEO communications satellite operators (Intelsat, SES, Eutelsat). Problem: GEO satellites generating
        $50-200M/yr revenue are retired when solar array degradation reduces power below operational thresholds. Solution:
        NEOWATT operates a TX satellite co-located in GEO with the ageing customer satellite, beaming supplemental power to
        restore capacity. Architecture: the ageing satellite cannot be modified (already in orbit, no RX pre-integrated).
        NEOWATT must operate its own co-located TX satellite and sell power delivery as a service. The customer may not even
        be the original satellite manufacturer. Service model is the only option.'
      category: Power Delivery
      time_horizon: Mid-term
      model_class: LifeExtensionModel
      notion_capabilities:
      - Extension of satellite operational lifetimes
      model_prose: 'NEOWATT operates its own TX satellite, co-located in GEO with the ageing customer satellite. Revenue is
        a flat annual service fee per satellite served. NEOWATT bears the full CAPEX: TX and RX hardware, launch costs for
        both, and ground segment infrastructure. The customer saving compares NEOWATT''s annual service fee against the incumbent
        alternative -- either a Northrop Grumman MEV docking contract at ~$13M/yr or the amortised cost of a full replacement
        satellite.'
      model_maths: '**Annual revenue:**

        $$R = P_{service}$$


        - $P_{service}$ = annual service fee per satellite ($/yr)


        **CAPEX:**

        $$C_{capex} = C_{tx} + C_{rx} + (m_{tx} + m_{rx}) \times L + C_{ground}$$


        **Annual OPEX:** $C_{ops}$


        **Customer saving:**

        $$S = \frac{C_{inc} - P_{service}}{C_{inc}}$$


        - $C_{inc}$ = incumbent annual cost (MEV contract or amortised replacement satellite, $/yr)

        - $P_{service}$ = our annual service fee'
    incumbent:
      name: Replacement launch or MEV-style docking
      cost_per_year_k:
