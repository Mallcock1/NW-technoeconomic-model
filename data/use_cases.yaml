  array_free_spacecraft:
    meta:
      name: Array-Free Spacecraft Design
      slug: array_free_spacecraft
      description: Reduce or eliminate onboard solar arrays, saving launch mass, volume, and drag, while also freeing the
        attitude budget from Sun-pointing constraints. Improves pointing stability for EO and astronomy missions.
      category: Spacecraft Design
      time_horizon: Mid-term
      model_class: LightweightSCModel
      notion_capabilities:
      - Avoid over-sizing solar arrays
      - Smaller or no solar arrays
      - Lower launch volume
      - Reduced drag and collision risk
      - Reduced need for Sun-pointing
      - Improved pointing stability
      model_prose: 'Deployable solar arrays are a major mass, volume, and cost driver for satellites. They also constrain
        attitude control: satellites must balance Sun-pointing (for power) with payload-pointing (for imaging, comms). This
        forces complex SADA mechanisms and introduces low-frequency structural oscillations. For LEO constellations, arrays
        increase drag and collision cross-section. NEOWATT enables array-free or array-reduced designs with two value streams:


        1. **Mass/volume/drag savings**: every kg of removed array saves launch cost and reduces collision risk

        2. **Pointing freedom**: removing arrays eliminates the Sun-pointing constraint, freeing the full attitude budget
        for payload operations and improving image quality for EO/astronomy missions'
      model_maths: '**Annual value to customer (two streams):**

        $$V_{annual} = \frac{m_{saved} \times (c_{launch} + c_{array/kg})}{N_{years}}$$


        Where:

        - $m_{saved}$ = mass of removed solar arrays (kg)

        - $c_{launch}$ = launch cost per kg

        - $c_{array/kg}$ = hardware cost per kg of deployable solar array


        **Customer saving:**

        $$S = \frac{c_{array/kg} - c_{RX/kg\_saved}}{c_{array/kg}}$$'
    incumbent:
      name: Standard onboard solar arrays
      array_cost_per_kg:
        value: 50000
        unit: $/kg
        description: Cost per kg of deployable solar array including structure
        justification: Deployable solar arrays cost $30-80k/kg including deployment mechanisms, wiring, and structural support.
          High-efficiency multi-junction cells and SADA mechanisms drive costs. Based on industry quotes and published smallsat
          costs.
        distribution:
          type: triangular
