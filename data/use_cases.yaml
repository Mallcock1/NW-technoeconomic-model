      addressable_units:
        value: 100
        unit: HAPS platforms
        description: HAPS market size
        justification: HAPS market is nascent but growing. Airbus, BAE, AALTO HAPS, SoftBank HAPSMobile are active. 20-500
          platforms over next decade.
        distribution:
          type: triangular
          low: 20
          mode: 100
          high: 500
        confidence: estimated
        source: UCS satellite database, market reports
      penetration_rate:
        value: 0.08
        unit: fraction
        description: Market capture rate
        justification: NEOWATT offers a unique capability for HAPS. Strong product-market fit but small market. 2-20% range.
        distribution:
          type: triangular
