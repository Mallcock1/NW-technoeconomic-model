  lunar_deep_space_night:
    meta:
      name: Lunar and Deep-Space Night Power
      slug: lunar_deep_space_night
      description: 'Customer: lunar surface mission operators (NASA Artemis, ESA, ispace, Astrobotic) and deep-space missions.
        Problem: the 14-day lunar night and permanently shadowed craters have no sunlight. Solution: NEOWATT operates a TX
        satellite on a lunar orbiter or crater-rim relay station, beaming power to surface assets during darkness. Architecture:
        the lunar orbiter relay is shared infrastructure serving multiple surface missions over many years. It is more efficient
        for NEOWATT to operate one relay than for each lander operator to launch their own. Service model with per-watt pricing.
        Customer integrates a dust-resistant RX on their lander/rover.'
      category: Power Delivery
      time_horizon: Mid-term
      model_class: StandardPowerModel
      model_prose: 'NEOWATT operates a TX satellite on a lunar orbiter or crater-rim relay station. Revenue is a price per
        watt of delivered power, adjusted for the night fraction (~50% for the 14-day lunar night cycle) and system availability.
        NEOWATT bears the full CAPEX: TX and RX hardware, launch costs for both, and ground segment. The customer saving compares
        NEOWATT''s price per watt against the incumbent cost of RTGs or the economic value lost from mission hibernation during
        lunar night.'
      model_maths: '**Annual revenue:**

        $$R = P \times W \times d \times a$$


        - $P$ = power delivered to surface asset (W)

        - $W$ = willingness to pay per watt ($/W)

        - $d$ = duty cycle (~0.50 for 14-day night out of 28-day cycle)

        - $a$ = system availability


        **CAPEX:**

        $$C_{capex} = C_{tx} + C_{rx} + (m_{tx} + m_{rx}) \times L + C_{ground}$$


        **Annual OPEX:** $C_{ops}$


        **Customer saving:**

        $$S = \frac{C_{inc} - W}{C_{inc}}$$


        - $C_{inc}$ = incumbent cost per watt ($/W) -- RTG cost or economic value of mission downtime during lunar night'
      notion_capabilities:
      - Power available in shadowed or low-illumination regions
      - Power during lunar night
