  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Power-as-a-Service Platform
  # ─────────────────────────────────────────────────────────────────────────────
  power_as_service:
    meta:
      name: "Power-as-a-Service Platform"
      slug: "power_as_service"
      description: "Subscription-based power delivery, enabling CAPEX-to-OPEX shift. Decouples power generation from spacecraft design."
      category: "Economic"
      time_horizon: "Mid-term"
      model_class: "PowerAsServiceModel"
      notion_capabilities:
        - "Shift from CAPEX to OPEX for power"
        - "Decoupling power generation from spacecraft"
        - "Sale of surplus power by generators"

      model_prose: |
        Instead of building solar arrays and batteries into every satellite, customers subscribe
        to a NEOWATT power service. A single NEOWATT TX platform serves multiple customer
        satellites, each equipped with a lightweight RX module. Customers shift from high upfront
        CAPEX (solar array + battery) to predictable OPEX (annual subscription). This benefits
        new space entrants with capital constraints and enables faster satellite development by
        removing the power subsystem design burden. At scale, NEOWATT operates like a utility —
        selling watts from orbital infrastructure.

      model_maths: |
        **Revenue model (annual, per TX platform):**
        $$R = P_{subscription/yr} \times N_{customers}$$

        **Cost model:**
        $$C_{CAPEX} = C_{TX} + N_{customers} \times (C_{RX} + m_{RX} \times c_{launch}) + m_{TX} \times c_{launch} + C_{ground}$$
        $$C_{OPEX/yr} = C_{ops}$$

        **Customer saving:**
        $$S = \frac{C_{CAPEX\_avoided} - P_{subscription/yr} \times N_{years}}{C_{CAPEX\_avoided}}$$
        Where $C_{CAPEX\_avoided}$ is the solar array + battery cost the customer no longer needs.

    incumbent:
      name: "Self-provisioned onboard solar + battery"
      capex_avoided_per_customer_k:
        value: 500
