      tx_sale_price_k:
        value: 324
        unit: $k
        description: Sale price of TX payload to customer
        justification: Manufacturing cost $180k with ~180% gross margin on hardware.
        confidence: guessed
        source: Target hardware margin for space components
        distribution:
          type: triangular
          low: 227
          mode: 324
          high: 486
      rx_sale_price_k:
        value: 96
        unit: $k
        description: Sale price of RX module to customer
        justification: Manufacturing cost $60k with ~160% gross margin on hardware.
        confidence: guessed
        source: Target hardware margin for space components
        distribution:
