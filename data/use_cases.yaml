        description: Rideshare launch cost to orbit (Falcon 9 class)
        justification: Current Falcon 9 rideshare ~$5000/kg. SpaceX Starship projected to reach $1000-2000/kg by 2030. Range
          $2500-8000/kg covers near-term uncertainty. Will decline over time as reusability matures.
        distribution: *id001
