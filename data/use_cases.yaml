      slug: lunar_deep_space_night
      description: 'Power delivery to assets in prolonged darkness: lunar night (14 days), permanently shadowed regions (lunar
        south pole craters), and asteroid shadows. Replaces RTGs or mission hibernation.'
      category: Power Delivery
      time_horizon: Mid-term
      model_class: StandardPowerModel
      model_prose: Several space environments have prolonged or permanent darkness where solar power is unavailable. The 14-day
        lunar night forces surface missions to hibernate or carry RTGs. Permanently shadowed regions (PSRs) at the lunar south
        pole contain valuable water ice but receive no sunlight at all. Deep-space asteroid missions face similar challenges.
        NEOWATT beams power from a sunlit orbital relay or surface hilltop transmitter, enabling continuous operations. The
        extremely high WTP reflects the scarcity of alternatives -- RTGs are expensive, export-controlled, and limited in
        Pu-238 supply.
      model_maths: '**Revenue model:** Same as standard power delivery.

        $$R = P_{delivered} \times WTP_{/W} \times \delta_{night} \times \alpha$$


        Where $\delta_{night} \approx 0.5$ (14 days night / 28 day cycle).


        **Key challenge:** If beaming from Earth, distance is ~384,400km with very low

        link efficiency (~4%). Lunar orbiter relay is more efficient but adds orbital

        infrastructure cost.

        '
