  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Lightweight Spacecraft Design
  # ─────────────────────────────────────────────────────────────────────────────
  lightweight_sc:
    meta:
      name: "Lightweight Spacecraft Design"
      slug: "lightweight_sc"
      description: "Reduce or eliminate onboard solar arrays, saving launch mass, volume, and drag."
      category: "Spacecraft Design"
      time_horizon: "Mid-term"
      model_class: "LightweightSCModel"
      notion_capabilities:
        - "Avoid over-sizing solar arrays"
        - "Smaller or no solar arrays"
        - "Lower launch volume"
        - "Reduced drag and collision risk"

      model_prose: |
        Deployable solar arrays are a major mass, volume, and cost driver for satellites.
        For LEO constellations especially, arrays increase drag (higher station-keeping fuel
        or shorter life), collision cross-section, and launch volume (limits rideshare packing).
        If NEOWATT provides reliable power, satellites can reduce or eliminate solar arrays.
        The value is quantified as: mass saved x launch cost savings + array hardware cost
        avoided. This is a design-level value proposition — customers must commit at satellite
        design phase, making it a longer sales cycle but deeply integrated relationship.

      model_maths: |
        **Annual value to customer:**
        $$V_{annual} = \frac{m_{saved} \times (c_{launch} + c_{array/kg})}{N_{years}}$$

        Where:
        - $m_{saved}$ = mass of removed solar arrays (kg)
        - $c_{launch}$ = launch cost per kg ($/kg)
        - $c_{array/kg}$ = cost per kg of deployable solar array hardware ($/kg)
        - $N_{years}$ = amortization period

        **Customer saving:**
        $$S = \frac{c_{array/kg} - c_{RX/kg\_saved}}{c_{array/kg}}$$
        Where $c_{RX/kg\_saved}$ = cost of NEOWATT RX per kg of array mass it replaces.

    incumbent:
      name: "Standard onboard solar arrays"
      array_cost_per_kg:
        value: 50000
        unit: "$/kg"
        description: "Cost per kg of deployable solar array including structure"
        justification: "Deployable solar arrays cost $30-80k/kg including deployment mechanisms, wiring, and structural support. High-efficiency multi-junction cells and SADA mechanisms drive costs. Based on industry quotes and published smallsat costs."
