        $$C_{OPEX/yr} = C_{ops}$$


        **Viability (greenfield):** No direct incumbent to beat. Uses P(positive NPV) >= 50%.


        **Incumbent framing:** Cost of inaction = regulatory fines, insurance premium

        increases, collision avoidance manoeuvre costs per object.

