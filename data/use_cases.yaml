        justification: Northrop Grumman MEV-1 docked with Intelsat 901 in 2020 under a ~5-year contract worth an estimated
          $65M total (~$13M/yr). This is the best available revealed preference data for satellite life extension WTP. Range
          $8-20M/yr reflects variation across satellite revenue profiles.
        distribution:
