  # ─────────────────────────────────────────────────────────────────────────────
  # 8. Attitude-Independent Power
  # ─────────────────────────────────────────────────────────────────────────────
  attitude_independent:
    meta:
      name: "Attitude-Independent Power"
      slug: "attitude_independent"
      description: "Remove Sun-pointing constraint by receiving power from beamed source. Frees attitude budget for payload pointing."
      category: "Spacecraft Design"
      time_horizon: "Mid-term"
      model_class: "AttitudeIndependentModel"
      notion_capabilities:
        - "Reduced need for Sun-pointing"
        - "Improved pointing stability (reduced low-freq structural oscillations)"

      model_prose: |
        Solar-powered satellites must balance Sun-pointing (for power generation) with
        payload-pointing (for imaging, comms, etc.). This constrains attitude control design,
        requires solar array drive assemblies (SADAs), and introduces low-frequency structural
        oscillations from large deployable arrays. Removing arrays eliminates the Sun-pointing
        constraint entirely, freeing the full attitude budget for payload operations. For EO
        and astronomy missions, this translates to better image quality, more agile manoeuvring,
        and simpler ADCS design.

      model_maths: |
        **Annual revenue:**
        $$R = V_{payload\_ops/yr}$$
        Where $V_{payload\_ops/yr}$ is the annual value of freed pointing budget.

        **Customer saving:**
        $$S = \frac{C_{incumbent/sc} - C_{RX}}{C_{incumbent/sc}}$$
        Where $C_{incumbent/sc}$ is the cost of attitude constraints per spacecraft
