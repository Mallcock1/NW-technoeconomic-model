        **Annual OPEX:** $C_{ops}$


        **Customer saving:**

        $$S = \frac{C_{inaction} - W_{obj}}{C_{inaction}}$$


        - $C_{inaction}$ = cost of not removing debris per object (regulatory fines, insurance increases, collision avoidance
        manoeuvre costs)


        **Viability (greenfield):** positive NPV in majority of simulations'
