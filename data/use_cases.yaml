      slug: debris_laser_ablation
      description: 'Customer: space agencies, constellation operators, and insurance providers facing debris collision risk.
        Problem: ~30,000 tracked debris objects threaten orbital infrastructure; no cost-effective removal solution exists.
        Solution: NEOWATT operates a high-power laser satellite in LEO that ablates debris surfaces to generate deorbit thrust.
        Architecture: there is no customer satellite -- the target is uncooperative debris. NEOWATT must own and operate the
        laser platform and sell removal contracts. Government/agency customers pay per object removed.'
      category: Active Debris Removal
      time_horizon: Mid-term
      model_class: DebrisAblationModel
      incumbent_type: greenfield
      model_prose: 'NEOWATT operates a high-power laser satellite in LEO. Revenue is the price per debris object removed multiplied
        by the number of objects engaged per year. There is no receiver hardware or launch cost -- the target is uncooperative
        debris. NEOWATT bears all CAPEX: the laser satellite hardware, launch, and ground segment. This is a greenfield market
        with no direct incumbent to beat, so viability is assessed by whether the net present value is positive rather than
        by beating an incumbent price.'
