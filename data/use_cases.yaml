  # ─────────────────────────────────────────────────────────────────────────────
  # 5. HAPS Power (Terrestrial)
  # ─────────────────────────────────────────────────────────────────────────────
  haps_power:
    meta:
      name: "HAPS Power (Terrestrial)"
      slug: "haps_power"
      description: "Ground-to-HAPS laser power beaming for indefinite station-keeping of high-altitude pseudo-satellites."
      category: "Power Delivery"
      time_horizon: "Near-term"
      model_class: "StandardPowerModel"

      model_prose: |
        High Altitude Pseudo-Satellites (HAPS) operate at 18-22km altitude providing persistent
        surveillance, communications, or environmental monitoring. Their key limitation is
        endurance: solar-powered HAPS like Airbus Zephyr can fly for weeks but are constrained
        by overnight battery capacity and seasonal solar variation. NEOWATT beams power from
        ground stations to HAPS at short range (~20km, near-vertical), achieving high link
        efficiency thanks to minimal atmospheric path and no vacuum-to-atmosphere transition.
        This is NEOWATT's terrestrial wedge market — near-term, lower technical risk, and a
        stepping stone to orbital systems.

      model_maths: |
        **Revenue model (annual):**
        $$R = P_{delivered} \times WTP_{/W} \times \delta \times \alpha$$

        Same model as LEO Eclipse but with key differences:
        - Higher $\delta$ (0.60-0.95): HAPS needs near-continuous power
        - Higher link efficiency (0.12-0.35): short range, thin atmosphere at altitude
        - Lower WTP ($140/W): competing against mature solar+battery HAPS designs
        - Ground-based TX: mass is less critical, but cost still matters

    incumbent:
      name: "Onboard solar + battery arrays"
      cost_per_W:
        value: 180
        unit: "$/W"
        description: "Cost per watt of HAPS onboard power system"
        justification: "HAPS solar cells are lightweight, high-efficiency (typically IMM multi-junction). Battery packs for overnight operation add significant mass and cost. Total system cost $100-300/W based on Airbus Zephyr and BAE PHASA-35 class systems."
        distribution:
          type: triangular
          low: 100
          mode: 180
          high: 300

    technical:
      power_delivered_W:
        value: 2000
        unit: "W"
        description: "Power delivered to HAPS platform"
        justification: "Zephyr-class HAPS needs ~1.5kW average. Larger HAPS concepts need 3-5kW. 500-5000W range covers current and next-gen platforms."
        distribution:
          type: triangular
          low: 500
          mode: 2000
          high: 5000
      distance_km:
