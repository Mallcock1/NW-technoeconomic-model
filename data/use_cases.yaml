  leo_duty_cycle_extension:
    meta:
      name: LEO Duty Cycle Extension
      slug: leo_duty_cycle_extension
      description: Beam power to LEO satellites during eclipse, extending operational duty cycles and reducing battery oversizing.
      category: Power Delivery
      time_horizon: Near-term
      model_class: StandardPowerModel
      notion_capabilities:
      - Power during eclipses and anomaly recovery
      - Power resilience after partial degradation or damage
      model_prose: 'LEO satellites spend ~35% of each orbit in Earth''s shadow (eclipse). During eclipse,

        they rely entirely on batteries charged during the sunlit portion. This forces operators

        to oversize solar arrays (to charge faster) and carry large battery packs, adding mass,

        cost, and failure modes. NEOWATT beams power to satellites during eclipse from an

        orbital transmitter or ground station, reducing or eliminating the need for battery

        oversizing. The customer value is measured by comparing NEOWATT''s price per watt of

        eclipse power against the incumbent cost of achieving the same capability through

        extra solar panels and batteries.

        '
      model_maths: '**Revenue model (annual):**

        $$R = P_{delivered} \times WTP_{/W} \times \delta \times \alpha$$


        Where:

        - $P_{delivered}$ = power delivered at receiver (W)

        - $WTP_{/W}$ = customer willingness to pay per watt ($/W)

        - $\delta$ = duty cycle (fraction of orbit in eclipse, ~0.35)

        - $\alpha$ = system availability (accounting for geometry, weather, maintenance)


        **Cost model:**

        $$C_{CAPEX} = C_{TX} + C_{RX} + (m_{TX} + m_{RX}) \times c_{launch} + C_{ground}$$

        $$C_{OPEX/yr} = C_{ops}$$

        $$C_{total} = C_{CAPEX} + C_{OPEX/yr} \times N_{years}$$


        **Customer saving vs incumbent:**

        $$S = \frac{C_{incumbent/W} - WTP_{/W}}{C_{incumbent/W}}$$


        **Viability test:** $P(S \geq 50\%) \geq 60\%$ → GO

        '
    incumbent:
      name: Battery oversizing + extra solar panels
      cost_per_W:
        value: 300
        unit: $/W
        description: Cost of delivering 1W during eclipse via batteries + panel overbuild
        justification: Based on typical LEO smallsat battery costs ($500-1000/kg) and solar array costs ($500-2000/W at system
          level). A 500W eclipse capability requires ~1.5kWh battery pack (~$15k-30k) plus oversized panels (~$50-100k), giving
          roughly $200-500/W range. Central estimate $300/W from aggregated smallsat cost models.
        distribution:
          type: triangular
          low: 200
          mode: 300
          high: 500
        confidence: estimated
        source: Industry cost models, smallsat vendor quotes
    technical:
      power_delivered_W:
        value: 500
        unit: W
        description: Power delivered at receiver during eclipse
        justification: Triangular distribution reflects uncertainty in customer power needs. 200W lower bound covers basic
          housekeeping loads. 500W mode covers typical smallsat payload operation. 1500W high end covers larger satellites
          or multi-customer scenarios.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      distance_km:
        value: 600
        unit: km
        description: Typical LEO sat-to-sat or ground-to-LEO distance
        justification: LEO altitudes range 400-1200km. 600km mode represents the densest orbital band. Lower bound 400km for
          ISS-orbit customers, upper 1200km for sun-synchronous.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      link_efficiency:
        value: 0.12
        unit: fraction
        description: End-to-end optical link efficiency (laser to electrical at RX)
        justification: 'Chain: laser wall-plug efficiency (~40-50%) x optics/pointing losses (~50-70%) x atmospheric/vacuum
          transmission (~80-95%) x PV conversion at laser wavelength (~40-50%). Combined gives 5-25% range. 12% mode is conservative
          for current technology. Will improve as PV efficiency and laser tech advance.'
        confidence: estimated
        source: NEOWATT internal engineering analysis
      duty_cycle:
        value: 0.35
        unit: fraction
        description: Fraction of orbit in eclipse requiring beamed power
        justification: Uniform distribution because eclipse fraction is geometrically determined by orbit altitude and inclination.
          LEO eclipses typically 25-40% of orbit period. Uniform reflects that all values in this range are roughly equally
          likely across the customer base.
        confidence: estimated
        source: NEOWATT internal engineering analysis
      availability:
        value: 0.9
        unit: fraction
        description: System availability accounting for weather, geometry, maintenance
        justification: Triangular with mode at 0.90. Lower bound 0.75 accounts for early-stage reliability issues and orbital
          geometry constraints (TX and RX must have line of sight). Upper bound 0.98 reflects mature constellation with redundancy.
        confidence: estimated
        source: NEOWATT internal engineering analysis
    cost:
      tx_hardware_k:
        value: 180
        unit: $k
        description: Transmitter payload hardware cost
        justification: Estimated from laser module ($30-80k), optics/telescope ($20-50k), power conditioning ($15-40k), thermal
          management ($10-30k), PAT system ($25-60k), structure and integration ($20-50k). Total range $100-350k, mode $180k
