    economic:
      wtp_per_W:
        value: 140
        unit: $/W
        description: Customer WTP per watt for HAPS power
        justification: Must undercut incumbent ($180/W) to be attractive. $140/W gives ~22% saving. Range $60-250/W reflects
          variation from defence (higher WTP) to commercial (lower WTP) customers.
        distribution:
          type: triangular
          low: 60
          mode: 140
          high: 250
        confidence: guessed
        source: Must be below incumbent; no direct customer validation yet
      amortization_years:
        value: 10
        unit: years
        description: System lifetime
        justification: Ground TX has long life (10-15 years). HAPS platform itself may be replaced. 7-15 year range.
        distribution:
          type: triangular
          low: 7
          mode: 10
          high: 15
        confidence: estimated
